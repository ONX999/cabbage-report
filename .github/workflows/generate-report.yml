name: 自動產生甘藍價格報表

on:
  schedule:
    # 每日早上 8:00 (UTC) 執行，相當於台灣時間 16:00
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 允許手動觸發
    inputs:
      report_type:
        description: '報表類型'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - history
      start_date:
        description: '起始日期 (YYYY-MM-DD, 僅歷史報表需要)'
        required: false
        type: string
      end_date:
        description: '結束日期 (YYYY-MM-DD, 僅歷史報表需要)'
        required: false
        type: string
      output_format:
        description: '輸出格式'
        required: true
        default: 'excel,pdf'
        type: choice
        options:
          - excel
          - pdf
          - excel,pdf

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4
      
    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 建立輸出目錄
      run: mkdir -p output
      
    - name: 產生每日報表 (排程執行)
      if: github.event_name == 'schedule'
      run: |
        python main.py daily --format excel pdf --log-level INFO
        
    - name: 產生每日報表 (手動執行)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'daily'
      run: |
        FORMAT_ARGS=$(echo "${{ github.event.inputs.output_format }}" | tr ',' ' ')
        python main.py daily --format $FORMAT_ARGS --log-level INFO
        
    - name: 產生歷史報表 (手動執行)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'history'
      run: |
        FORMAT_ARGS=$(echo "${{ github.event.inputs.output_format }}" | tr ',' ' ')
        python main.py history --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}" --format $FORMAT_ARGS --log-level INFO
        
    - name: 上傳報表檔案
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cabbage-reports-${{ github.run_number }}
        path: output/
        retention-days: 30
        
    - name: 上傳日誌檔案
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cabbage-logs-${{ github.run_number }}
        path: '*.log'
        retention-days: 7

    - name: 檢查報表產生狀態
      run: |
        if [ -n "$(find output -name '*.xlsx' -o -name '*.pdf' 2>/dev/null)" ]; then
          echo "✅ 報表成功產生"
          ls -la output/
        else
          echo "❌ 報表產生失敗或無檔案產生"
          exit 1
        fi